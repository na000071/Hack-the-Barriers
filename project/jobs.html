<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Jobs</title>
	<link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
	<header class="site-header">
		<div class="container nav-wrap">
			<h1 class="logo">Hack The Barriers</h1>
			<nav>
				<a href="index.html">Home</a>
				<a href="jobs.html">Jobs</a>
				<a href="about.html">About</a>
				<a href="contact.html">Contact</a>
			</nav>
		</div>
	</header>

	<main>
		<section class="section jobs-hero">
			<div class="container jobs-hero-content">
				<h2>Find Inclusive Job Opportunities</h2>
				<p>Use accessibility and inclusivity filters to find roles that fit your needs.</p>
			</div>
		</section>

		<section class="section jobs-section">
			<div class="container">
				<article class="jobs-filter-card">
					<h3>Accessibility & Inclusivity Filters</h3>
					<form class="jobs-filter-form" action="#" method="get">
						<label><input type="checkbox" name="filter" value="accessible-workplace"> ♿ Accessible workplace</label>
						<label><input type="checkbox" name="filter" value="remote-friendly"> 🏠 Remote-friendly</label>
						<label><input type="checkbox" name="filter" value="mental-health-supportive"> 🧠 Mental health supportive environment</label>
						<label><input type="checkbox" name="filter" value="flexible-work"> 🛠️ Flexible work arrangements</label>
						<button class="btn-primary" type="submit">Apply Filters</button>
					</form>
				</article>
			</div>
		</section>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>© 2026 Hack The Barriers. All rights reserved.</p>
		</div>
	</footer>
</body>
</html>
